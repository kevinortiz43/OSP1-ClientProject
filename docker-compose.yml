services:
  # Frontend service (Vite)
  frontend:
    build:
      context: .
      target: dev
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:3000
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    # REMOVED volumes: section - let develop.watch handle it
    develop:
      watch:
        # Sync client files (hot reload)
        - action: sync
          path: ./src/client
          target: /app/src/client
        # Sync assets
        - action: sync
          path: ./src/assets
          target: /app/src/assets
        # Sync public folder
        - action: sync
          path: ./public
          target: /app/public
        # Sync root files
        - action: sync
          path: ./index.html
          target: /app/index.html
        - action: sync
          path: ./vite.config.ts
          target: /app/vite.config.ts
        # Rebuild on package.json changes
        - action: rebuild
          path: package.json
    networks:
      - app-network

  # Backend service (Express with hot reload)
  backend:
    build:
      context: .
      target: dev
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://root:root@db:5432/test_db
      - NODE_ENV=development
      - PORT=3000
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=test_db
      - DB_USER=root
      - DB_PASSWORD=root
      - TEXT2SQL_URL=http://localhost:12434/engines/v1
      - TEXT2SQL_MODEL=hf.co/mradermacher/Arctic-Text2SQL-R1-7B-GGUF:Q4_K_M
      # Or will the AI model be AUTO-INJECTED by DMR??
      # - TEXT2SQL_URL (from models definition)
      # - TEXT2SQL_MODEL (from models definition)
    # MODEL BINDING - Tells DMR to provision this model
    models:
      text2sql: # Reference to the model defined below
        endpoint_var: TEXT2SQL_URL # Custom name for URL
        model_var: TEXT2SQL_MODEL # Custom name for model ID
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G

    command: ["npm", "run", "server"]
    # REMOVED volumes: section - let develop.watch handle it
    develop:
      watch:
        # IMPORTANT: sync+restart will sync files AND restart the container
        - action: sync+restart
          path: ./src/server
          target: /app/src/server
          ignore:
            - "**/*.log"
            - "**/*.tmp"
        # If you have shared code
        - action: sync+restart
          path: ./src/shared
          target: /app/src/shared
        # Rebuild on package.json changes
        - action: rebuild
          path: package.json
    depends_on:
      - db
    networks:
      - app-network

  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: test_db
    ports:
      - "5432:5432"
    networks:
      - app-network
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # pgAdmin GUI
  pgadmin:
    container_name: pgadmin4_container
    image: dpage/pgadmin4
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: root
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - app-network
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  # TOP-LEVEL MODELS SECTION (Required)
models:
  text2sql:
    model: hf.co/mradermacher/Arctic-Text2SQL-R1-7B-GGUF:Q4_K_M
    context_size: 4096
    runtime_flags:
      - "--n-gpu-layers"
      - "0" # no gpu use
      - "--threads"
      - "7" # 7 threads
      - "--mlock"
      - "--batch-size"
      - "1024"
      - "--temp"
      - "0.1"
      - "--threads-batch"
      - "7"  # Match --threads for batch processing
      - "--no-mmap"  # May improve performance on some systems
      - "--repeat-penalty"
      - "1.1"  # Prevent repetitive SQL
  # Development flags (optional - remove for production):
      - "--verbose"
      - "--verbose-prompt"
      - "--log-prefix"
      - "--log-timestamps"
      - "--log-colors"

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  pgadmin_data:
