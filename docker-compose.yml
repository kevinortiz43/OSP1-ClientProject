services:
  # --- Frontend ---
  frontend:
    build:
      context: .
      target: dev
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:3000
    command: [ "npm", "run", "dev", "--", "--host", "0.0.0.0" ]
    develop:
      watch:
        - action: sync
          path: ./src/client
          target: /app/src/client
        - action: sync
          path: ./src/assets
          target: /app/src/assets
        - action: sync
          path: ./public
          target: /app/public
        - action: sync
          path: ./index.html
          target: /app/index.html
        - action: sync
          path: ./vite.config.ts
          target: /app/vite.config.ts
        - action: rebuild
          path: package.json
    networks:
      - app-network

  # --- AI Model Service (Ollama) --
  ollama:
    image: ollama/ollama:latest
    # image: ollama/ollama:0.15.5-rc2  # if want to test Qwen3-coder-next (requires this pre-release beta version). Would have to npm run tear and re-install ollama which will take time
    container_name: ollama-4090
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    runtime: nvidia
    init: true
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_PORT=11434
      - OLLAMA_NUM_PARALLEL=4
      - OLLAMA_MAX_LOADED_MODELS=2 # keep 2 models loaded
      - OLLAMA_KEEP_ALIVE=-1 # keep both models loaded forever
      - OLLAMA_DEBUG=0
      - OLLAMA_CONTEXT_LENGTH=8192 
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "ollama", "list" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - app-network

  # --- Backend Service ---
  backend:
    build:
      context: .
      target: dev
    ports:
      - "3000:3000"
    volumes:
      - ./src/server/aiTest:/app/src/server/aiTest
    environment:
      - DATABASE_URL=postgresql://root:root@db:5432/test_db
      - NODE_ENV=development
      - PORT=3000
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=test_db
      - DB_USER=root
      - DB_PASSWORD=root
      - TEXT2SQL_URL=http://ollama:11434
      - TEXT2SQL_MODEL=${TEXT2SQL_MODEL:-arctic-text2sql} # change model here, also in .env
      # - TEXT2SQL_MODEL=${TEXT2SQL_MODEL:-sqlcoder}
      # - TEXT2SQL_MODEL=${TEXT2SQL_MODEL:-qwen2.5-coder}
      # - JUDGE_MODEL=${JUDGE_MODEL:-qwen3-32b} 
      - JUDGE_MODEL=${JUDGE_MODEL:-phi4-reasoning} 
      - MODEL_REGISTRY_URL=http://ollama:11434/api/tags
      - HARDWARE_TIER=4090-workstation
    command: [ "npm", "run", "server" ]
    develop:
      watch:
        - action: sync+restart
          path: ./src/server
          target: /app/src/server
          ignore:
            - "**/*.log"
            - "**/*.tmp"
        - action: sync+restart
          path: ./src/shared
          target: /app/src/shared
        - action: rebuild
          path: package.json
    depends_on:
      db:
        condition: service_started
      ollama:
        condition: service_healthy
    networks:
      - app-network

  # --- PostgreSQL Database ---
  db:
    image: postgres:16-alpine
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: test_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  # --- pgAdmin GUI ---
  pgadmin:
    container_name: pgadmin4_container
    image: dpage/pgadmin4
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: root
    ports:
      - "5050:80"
    depends_on:
      - db
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - app-network

# --- Networks ---
networks:
  app-network:
    driver: bridge

# --- Volumes ---
volumes:
  ollama_models:
    driver: local
    name: ollama_models_4090
  postgres_data:
  pgadmin_data:
