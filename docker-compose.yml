services:
  # Frontend service (Vite)
  frontend:
    build:
      context: .
      target: dev
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://backend:3000
    command: ["npm", "run", "start"]
    volumes:
      - node_modules_frontend:/app/node_modules
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
          ignore:
            - src/server/
        - action: sync
          path: ./public
          target: /app/public
        - action: rebuild
          path: package.json
    depends_on:
      - backend
    networks:
      - app-network

  # Backend service (Express)
  backend:
    build:
      context: .
      target: dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      # Database connection for PostgreSQL
      - DATABASE_URL=postgresql://root:root@db:5432/test_db
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=test_db
      - DB_USER=root
      - DB_PASSWORD=root
    command: ["npm", "run", "server"]
    volumes:
      - node_modules_backend:/app/node_modules
      - ./src/server/sql_db/data:/app/src/server/sql_db/data
    develop:
      watch:
        - action: sync+restart
          path: ./src/server
          target: /app/src/server
        - action: rebuild
          path: package.json
    depends_on:
      - db
    networks:
      - app-network

  db:
    image: postgres:16-alpine
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: test_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  # pgAdmin GUI
  pgadmin:
    container_name: pgadmin4_container
    image: dpage/pgadmin4:latest
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: root
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - app-network
    depends_on:
      - db

networks:
  app-network:
    driver: bridge

volumes:
  node_modules_frontend:
  node_modules_backend:
  postgres_data:
  pgadmin_data: